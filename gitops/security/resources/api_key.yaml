api_keys:
  - name: tf_api_key_1
    expiration: 7d

    role_descriptors:
      reader-role:
        cluster:
          - monitor

        indices:
          - names:
              - "tf_index*"
            privileges:
              - read
              - write
              - view_index_metadata

    metadata:
      env: dev
      team: platform

